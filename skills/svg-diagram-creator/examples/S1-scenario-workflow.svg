<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <filter id="s2"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#5B8DD9"/>
    </marker>
    <linearGradient id="gBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFE"/>
      <stop offset="100%" style="stop-color:#EDF2FA"/>
    </linearGradient>
  </defs>

  <rect width="960" height="420" fill="url(#gBg)"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" fill="#2D3E56" font-size="20" font-weight="bold">CODE REVIEW AUTOMATION WORKFLOW</text>
  <text x="480" y="52" text-anchor="middle" fill="#888" font-size="12">From submission to structured quality report — fully automated</text>

  <!-- ====== Stage 1: Code Submission (icon: document + code) ====== -->
  <g transform="translate(60, 90)">
    <!-- Document body -->
    <rect x="10" y="0" width="130" height="170" rx="8" fill="white" stroke="#84B0DC" stroke-width="1.5" filter="url(#s)"/>
    <!-- Folded corner -->
    <path d="M110 0 L140 0 L140 30 L110 30 Z" fill="#E0ECF8" stroke="#84B0DC" stroke-width="1"/>
    <path d="M110 0 L110 30 L140 30" fill="none" stroke="#84B0DC" stroke-width="1.5"/>
    <!-- Code lines inside document -->
    <rect x="24" y="44" width="60" height="6" rx="2" fill="#5B8DD9" opacity="0.6"/>
    <rect x="24" y="56" width="90" height="6" rx="2" fill="#9B6DC8" opacity="0.5"/>
    <rect x="24" y="68" width="45" height="6" rx="2" fill="#5B8DD9" opacity="0.4"/>
    <rect x="24" y="80" width="80" height="6" rx="2" fill="#E88020" opacity="0.5"/>
    <rect x="24" y="92" width="55" height="6" rx="2" fill="#5B8DD9" opacity="0.6"/>
    <rect x="24" y="104" width="70" height="6" rx="2" fill="#9B6DC8" opacity="0.4"/>
    <rect x="24" y="116" width="40" height="6" rx="2" fill="#5B8DD9" opacity="0.5"/>
    <!-- Code bracket icon -->
    <text x="75" y="150" text-anchor="middle" fill="#5B8DD9" font-size="22" font-weight="bold">&lt;/&gt;</text>
    <!-- Label -->
    <text x="75" y="192" text-anchor="middle" fill="#2D3E56" font-size="12" font-weight="bold">CODE SUBMISSION</text>
    <text x="75" y="208" text-anchor="middle" fill="#888" font-size="10">Source Code &amp; Changes</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(215, 155)">
    <polygon points="0 12, 60 0, 60 6, 90 6, 90 18, 60 18, 60 24" fill="#5B8DD9" opacity="0.8"/>
  </g>

  <!-- ====== Stage 2: Review Criteria (checklist card) ====== -->
  <g transform="translate(320, 75)">
    <!-- Clipboard body -->
    <rect x="0" y="14" width="200" height="240" rx="10" fill="white" stroke="#E88020" stroke-width="1.8" filter="url(#s)"/>
    <!-- Clipboard clip -->
    <rect x="65" y="0" width="70" height="28" rx="6" fill="#E88020"/>
    <circle cx="100" cy="14" r="6" fill="white"/>
    <!-- Title -->
    <rect x="0" y="28" width="200" height="32" fill="#FFF4E8"/>
    <text x="100" y="49" text-anchor="middle" fill="#E88020" font-size="13" font-weight="bold">REVIEW CRITERIA</text>

    <!-- Checklist items -->
    <rect x="18" y="72" width="16" height="16" rx="3" fill="#E88020"/>
    <text x="18" y="85" fill="white" font-size="11" font-weight="bold">  ✓</text>
    <text x="42" y="84" fill="#2D3E56" font-size="11" font-weight="bold">Functionality &amp; Logic</text>

    <rect x="18" y="98" width="16" height="16" rx="3" fill="#E88020"/>
    <text x="18" y="111" fill="white" font-size="11" font-weight="bold">  ✓</text>
    <text x="42" y="110" fill="#2D3E56" font-size="11" font-weight="bold">Code Style &amp; Readability</text>

    <rect x="18" y="124" width="16" height="16" rx="3" fill="#E88020"/>
    <text x="18" y="137" fill="white" font-size="11" font-weight="bold">  ✓</text>
    <text x="42" y="136" fill="#2D3E56" font-size="11" font-weight="bold">Security Best Practices</text>

    <rect x="18" y="150" width="16" height="16" rx="3" fill="white" stroke="#CCC" stroke-width="1"/>
    <text x="42" y="162" fill="#2D3E56" font-size="11" font-weight="bold">Performance</text>

    <rect x="18" y="176" width="16" height="16" rx="3" fill="white" stroke="#CCC" stroke-width="1"/>
    <text x="42" y="188" fill="#2D3E56" font-size="11" font-weight="bold">Error Handling</text>

    <rect x="18" y="202" width="16" height="16" rx="3" fill="white" stroke="#CCC" stroke-width="1"/>
    <text x="42" y="214" fill="#2D3E56" font-size="11" font-weight="bold">Test Coverage</text>

    <rect x="18" y="228" width="16" height="16" rx="3" fill="white" stroke="#CCC" stroke-width="1"/>
    <text x="42" y="240" fill="#2D3E56" font-size="11" font-weight="bold">Documentation</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(535, 155)">
    <polygon points="0 12, 60 0, 60 6, 90 6, 90 18, 60 18, 60 24" fill="#E88020" opacity="0.8"/>
  </g>

  <!-- ====== Stage 3: Structured Report (dashboard style) ====== -->
  <g transform="translate(640, 70)">
    <rect x="0" y="0" width="260" height="280" rx="10" fill="white" stroke="#3A9A3A" stroke-width="1.8" filter="url(#s)"/>
    <!-- Header -->
    <rect x="0" y="0" width="260" height="34" rx="10" fill="#3A9A3A"/>
    <rect x="0" y="20" width="260" height="14" fill="#3A9A3A"/>
    <text x="130" y="22" text-anchor="middle" fill="white" font-size="12" font-weight="bold">STRUCTURED REPORT</text>

    <!-- Error card -->
    <rect x="14" y="44" width="232" height="52" rx="6" fill="#FFF0F0" stroke="#F0A0A0" stroke-width="1"/>
    <circle cx="36" cy="62" r="12" fill="#E05050"/>
    <text x="36" y="67" text-anchor="middle" fill="white" font-size="12" font-weight="bold">✕</text>
    <text x="56" y="60" fill="#B03030" font-size="11" font-weight="bold">ERROR</text>
    <text x="230" y="60" text-anchor="end" fill="#B03030" font-size="14" font-weight="bold">2</text>
    <rect x="56" y="68" width="80" height="6" rx="3" fill="#F0C0C0"/>
    <rect x="56" y="68" width="30" height="6" rx="3" fill="#E05050"/>
    <text x="56" y="86" fill="#C06060" font-size="8">Critical: Logic failure in module X</text>

    <!-- Warning card -->
    <rect x="14" y="102" width="232" height="52" rx="6" fill="#FFF8E8" stroke="#E0C050" stroke-width="1"/>
    <circle cx="36" cy="120" r="12" fill="#E8A020"/>
    <text x="36" y="125" text-anchor="middle" fill="white" font-size="14" font-weight="bold">!</text>
    <text x="56" y="118" fill="#806020" font-size="11" font-weight="bold">WARNING</text>
    <text x="230" y="118" text-anchor="end" fill="#806020" font-size="14" font-weight="bold">5</text>
    <rect x="56" y="126" width="80" height="6" rx="3" fill="#F0D890"/>
    <rect x="56" y="126" width="50" height="6" rx="3" fill="#E8A020"/>
    <text x="56" y="144" fill="#AA8030" font-size="8">Moderate: Code duplication detected</text>

    <!-- Info card -->
    <rect x="14" y="160" width="232" height="46" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1"/>
    <circle cx="36" cy="176" r="12" fill="#5B8DD9"/>
    <text x="36" y="181" text-anchor="middle" fill="white" font-size="12" font-weight="bold">i</text>
    <text x="56" y="176" fill="#2B5090" font-size="11" font-weight="bold">INFO</text>
    <text x="230" y="176" text-anchor="end" fill="#2B5090" font-size="14" font-weight="bold">8</text>
    <rect x="56" y="184" width="80" height="6" rx="3" fill="#B0CCE8"/>
    <rect x="56" y="184" width="65" height="6" rx="3" fill="#5B8DD9"/>

    <!-- Score -->
    <rect x="14" y="216" width="232" height="54" rx="6" fill="#E8F8E8" stroke="#80C880" stroke-width="1"/>
    <text x="35" y="236" fill="#2D3E56" font-size="9">OVERALL SCORE</text>
    <text x="60" y="258" fill="#2A7A2A" font-size="24" font-weight="bold">78</text>
    <text x="87" y="258" fill="#888" font-size="12">/100</text>
    <text x="110" y="242" fill="#555" font-size="9">Score: Conditional Approval.</text>
    <text x="110" y="254" fill="#555" font-size="9">Requires addressing critical</text>
    <text x="110" y="266" fill="#555" font-size="9">errors before merging.</text>
  </g>

  <!-- Bottom label -->
  <text x="480" y="396" text-anchor="middle" fill="#888" font-size="11">Type: S1 — Scenario Workflow with Icons &amp; Dashboard Elements</text>
</svg>
