<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.13"/></filter>
    <filter id="s2"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <linearGradient id="gTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A3060"/>
      <stop offset="100%" style="stop-color:#3A60A0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="#F0F3F8"/>
  <rect x="0" y="0" width="900" height="52" fill="url(#gTitle)"/>
  <text x="450" y="31" text-anchor="middle" fill="white" font-size="17" font-weight="bold">对话规则的三种形态</text>
  <text x="450" y="46" text-anchor="middle" fill="#AACCFF" font-size="11">每种形态触发的时机和目的不同，都需要在 SKILL.md 里显式设计</text>

  <!-- User input trigger -->
  <rect x="310" y="66" width="280" height="40" rx="20" fill="#2D3E56" filter="url(#s)"/>
  <text x="450" y="82" text-anchor="middle" fill="white" font-size="12" font-weight="bold">💬 用户输入 / 脚本返回结果</text>
  <text x="450" y="98" text-anchor="middle" fill="#AACCFF" font-size="10">触发 Skill 进行对话判断</text>

  <!-- Branch arrows -->
  <line x1="270" y1="110" x2="155" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="110" x2="450" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="110" x2="745" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Branch labels -->
  <text x="185" y="132" fill="#555" font-size="10" text-anchor="middle">意图不够清晰</text>
  <text x="450" y="132" fill="#555" font-size="10" text-anchor="middle">数据已返回</text>
  <text x="720" y="132" fill="#555" font-size="10" text-anchor="middle">超出能力范围</text>

  <!-- Card 1: 追问 -->
  <rect x="26" y="152" width="255" height="290" rx="12" fill="white" filter="url(#s)"/>
  <rect x="26" y="152" width="255" height="44" rx="12" fill="#1A5A9A"/>
  <rect x="26" y="182" width="255" height="14" fill="#1A5A9A"/>
  <text x="153" y="176" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🔍 追问</text>
  <text x="153" y="214" text-anchor="middle" fill="#2B5090" font-size="12" font-weight="bold">触发条件</text>
  <text x="46" y="234" fill="#4A70A0" font-size="10">· 目标实体未明确（需求/bug/指标）</text>
  <text x="46" y="250" fill="#4A70A0" font-size="10">· 时间范围未指定且有多种合理解读</text>
  <text x="46" y="266" fill="#4A70A0" font-size="10">· 查询维度超过一种且未说优先级</text>
  <line x1="46" y1="278" x2="261" y2="278" stroke="#E0E8F4" stroke-width="1"/>
  <text x="153" y="296" text-anchor="middle" fill="#2B5090" font-size="12" font-weight="bold">目的</text>
  <text x="153" y="314" text-anchor="middle" fill="#4A70A0" font-size="10">把「多轮猜测」压缩成</text>
  <text x="153" y="328" text-anchor="middle" fill="#4A70A0" font-size="10">「一次精准执行」</text>
  <line x1="46" y1="340" x2="261" y2="340" stroke="#E0E8F4" stroke-width="1"/>
  <text x="153" y="358" text-anchor="middle" fill="#2B5090" font-size="12" font-weight="bold">注意</text>
  <text x="153" y="374" text-anchor="middle" fill="#888" font-size="10">是「信息缺口」，不是「能力边界」</text>
  <text x="153" y="388" text-anchor="middle" fill="#888" font-size="10">两者的处理方式完全不同</text>
  <rect x="46" y="400" width="215" height="28" rx="6" fill="#EAF2FF" stroke="#5B8DD9" stroke-width="1"/>
  <text x="153" y="418" text-anchor="middle" fill="#2B5090" font-size="10" font-weight="bold">先问，再执行</text>

  <!-- Card 2: 主动提示 -->
  <rect x="322" y="152" width="255" height="290" rx="12" fill="white" filter="url(#s)"/>
  <rect x="322" y="152" width="255" height="44" rx="12" fill="#2A7A2A"/>
  <rect x="322" y="182" width="255" height="14" fill="#2A7A2A"/>
  <text x="449" y="176" text-anchor="middle" fill="white" font-size="14" font-weight="bold">💡 主动提示</text>
  <text x="449" y="214" text-anchor="middle" fill="#1A6A1A" font-size="12" font-weight="bold">触发条件</text>
  <text x="342" y="234" fill="#3A8A3A" font-size="10">· 返回数据为空（主动说可能原因）</text>
  <text x="342" y="250" fill="#3A8A3A" font-size="10">· 数量超 30 条（问是否需要筛选）</text>
  <text x="342" y="266" fill="#3A8A3A" font-size="10">· 字段值明显偏离正常范围</text>
  <line x1="342" y1="278" x2="557" y2="278" stroke="#C8ECC8" stroke-width="1"/>
  <text x="449" y="296" text-anchor="middle" fill="#1A6A1A" font-size="12" font-weight="bold">目的</text>
  <text x="449" y="314" text-anchor="middle" fill="#3A8A3A" font-size="10">把「展示数据」升级为</text>
  <text x="449" y="328" text-anchor="middle" fill="#3A8A3A" font-size="10">「给出判断 + 建议下一步」</text>
  <line x1="342" y1="340" x2="557" y2="340" stroke="#C8ECC8" stroke-width="1"/>
  <text x="449" y="358" text-anchor="middle" fill="#1A6A1A" font-size="12" font-weight="bold">注意</text>
  <text x="449" y="374" text-anchor="middle" fill="#888" font-size="10">触发条件要具体，不能是</text>
  <text x="449" y="388" text-anchor="middle" fill="#888" font-size="10">「遇到异常数据要提醒」</text>
  <rect x="342" y="400" width="215" height="28" rx="6" fill="#E8F8E8" stroke="#80C880" stroke-width="1"/>
  <text x="449" y="418" text-anchor="middle" fill="#1A6A1A" font-size="10" font-weight="bold">不等用户问，主动说有价值的东西</text>

  <!-- Card 3: 降级 -->
  <rect x="618" y="152" width="255" height="290" rx="12" fill="white" filter="url(#s)"/>
  <rect x="618" y="152" width="255" height="44" rx="12" fill="#7A3A1A"/>
  <rect x="618" y="182" width="255" height="14" fill="#7A3A1A"/>
  <text x="745" y="176" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🔄 降级</text>
  <text x="745" y="214" text-anchor="middle" fill="#7A3A1A" font-size="12" font-weight="bold">触发条件</text>
  <text x="638" y="234" fill="#AA6A3A" font-size="10">· 用户问了 Skill 能力范围之外的问题</text>
  <text x="638" y="250" fill="#AA6A3A" font-size="10">· 脚本接口不支持当前查询组合</text>
  <text x="638" y="266" fill="#AA6A3A" font-size="10">· 数据源不包含用户所需字段</text>
  <line x1="638" y1="278" x2="853" y2="278" stroke="#E8C8A8" stroke-width="1"/>
  <text x="745" y="296" text-anchor="middle" fill="#7A3A1A" font-size="12" font-weight="bold">目的</text>
  <text x="745" y="314" text-anchor="middle" fill="#AA6A3A" font-size="10">不用能做的事凑合回答</text>
  <text x="745" y="328" text-anchor="middle" fill="#AA6A3A" font-size="10">清楚说明边界 + 给出替代</text>
  <line x1="638" y1="340" x2="853" y2="340" stroke="#E8C8A8" stroke-width="1"/>
  <text x="745" y="358" text-anchor="middle" fill="#7A3A1A" font-size="12" font-weight="bold">注意</text>
  <text x="745" y="374" text-anchor="middle" fill="#888" font-size="10">需要写清楚「能力边界」</text>
  <text x="745" y="388" text-anchor="middle" fill="#888" font-size="10">模型才知道什么时候该触发降级</text>
  <rect x="638" y="400" width="215" height="28" rx="6" fill="#FFF0E8" stroke="#E89060" stroke-width="1"/>
  <text x="745" y="418" text-anchor="middle" fill="#7A3A1A" font-size="10" font-weight="bold">诚实说做不到，但告诉用户能做什么</text>
</svg>
