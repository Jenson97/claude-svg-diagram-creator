    <text x="58"  y="21" text-anchor="middle" fill="#6D5A00" font-size="11">安全合规性</text>
    <rect x="126" y="0"  width="116" height="32" rx="4" fill="#FFF8D8" stroke="#D4C040" stroke-width="0.8" filter="url(#s)"/>
    <text x="184" y="21" text-anchor="middle" fill="#6D5A00" font-size="11">内容匹配度</text>
    <rect x="0"   y="40" width="116" height="32" rx="4" fill="#FFF8D8" stroke="#D4C040" stroke-width="0.8" filter="url(#s)"/>
    <text x="58"  y="61" text-anchor="middle" fill="#6D5A00" font-size="11">语言规范性</text>
    <rect x="126" y="40" width="116" height="32" rx="4" fill="#FFF8D8" stroke="#D4C040" stroke-width="0.8" filter="url(#s)"/>
    <text x="184" y="61" text-anchor="middle" fill="#6D5A00" font-size="11">文案吸引力</text>
    <rect x="63"  y="80" width="116" height="32" rx="4" fill="#FFF8D8" stroke="#D4C040" stroke-width="0.8" filter="url(#s)"/>
    <text x="121" y="101" text-anchor="middle" fill="#6D5A00" font-size="11">人工创作感</text>
  </g>

