       FEEDBACK ARROWS
  ============================================================ -->
  <!-- 评测结果 → 业务评测 prompt调优 -->
  <path d="M967,100 L967,72 L697,72 L697,86" fill="none" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="830" y="68" text-anchor="middle" fill="#4A90D9" font-size="11" font-weight="bold">评测prompt调优</text>

  <!-- 线上回收 → 数据集 -->
  <path d="M1128,148 L1128,175 L157,175 L157,148" fill="none" stroke="#D0604A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="640" y="189" text-anchor="middle" fill="#D0604A" font-size="11" font-weight="bold">业务模型 / 工程调优反馈</text>

