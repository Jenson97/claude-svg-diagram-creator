  ============================================================ -->
  <g transform="translate(1118, 250)">
    <rect x="0" y="0" width="242" height="32" rx="5" fill="#fff" stroke="#E0A0B8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="21" text-anchor="middle" fill="#6A2040" font-size="11">Badcase归档与分析</text>

    <rect x="0" y="42" width="242" height="32" rx="5" fill="#fff" stroke="#E0A0B8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="63" text-anchor="middle" fill="#6A2040" font-size="11">问题类型归因</text>

    <rect x="0" y="84" width="242" height="32" rx="5" fill="#fff" stroke="#E0A0B8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="105" text-anchor="middle" fill="#6A2040" font-size="11">模型迭代对比验证</text>

    <rect x="0" y="126" width="242" height="32" rx="5" fill="#fff" stroke="#E0A0B8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="147" text-anchor="middle" fill="#6A2040" font-size="11">优化方向输入研发侧</text>
