       PHASE 1 详情
  ============================================================ -->
  <g transform="translate(38, 250)">
    <rect x="0" y="0" width="242" height="42" rx="5" fill="#fff" stroke="#A8D8A8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="18" text-anchor="middle" fill="#2D5A2D" font-size="11">AI生成广告文案</text>
    <text x="121" y="34" text-anchor="middle" fill="#6A8A6A" font-size="10">(模板片头/引导语/片尾等)</text>

    <rect x="0" y="94" width="242" height="32" rx="5" fill="#fff" stroke="#A8D8A8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="115" text-anchor="middle" fill="#2D5A2D" font-size="11">AI广告视频成片、模板视频</text>

