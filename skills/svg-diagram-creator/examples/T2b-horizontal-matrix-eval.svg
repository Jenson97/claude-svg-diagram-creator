  <g transform="translate(308, 470)">
    <rect x="0"   y="0"  width="116" height="32" rx="4" fill="#E0F8EC" stroke="#70B890" stroke-width="0.8" filter="url(#s)"/>
    <text x="58"  y="21" text-anchor="middle" fill="#1A5A38" font-size="11">视频质量</text>
    <rect x="126" y="0"  width="116" height="32" rx="4" fill="#E0F8EC" stroke="#70B890" stroke-width="0.8" filter="url(#s)"/>
    <text x="184" y="21" text-anchor="middle" fill="#1A5A38" font-size="11">片段衔接</text>
    <rect x="63"  y="40" width="116" height="32" rx="4" fill="#E0F8EC" stroke="#70B890" stroke-width="0.8" filter="url(#s)"/>
    <text x="121" y="61" text-anchor="middle" fill="#1A5A38" font-size="11">整体观感</text>
  </g>

  <!-- ============================================================
       PHASE 3 详情  —  三种评测方式卡片
  ============================================================ -->

  <g transform="translate(578, 250)">
    <rect x="0" y="0"   width="242" height="32" rx="5" fill="#FFF8D8" stroke="#D4C040" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="21" text-anchor="middle" fill="#6D5A00" font-size="11">LLM文本评测 - 文案质量</text>

    <rect x="0" y="42"  width="242" height="32" rx="5" fill="#FFF0E0" stroke="#E0A070" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="63" text-anchor="middle" fill="#7A3800" font-size="11">多模态视频评测 - 安全合规</text>

    <rect x="0" y="84"  width="242" height="32" rx="5" fill="#E0F8EC" stroke="#70B890" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="105" text-anchor="middle" fill="#1A5A38" font-size="11">人工端到端评测 - 整体效果</text>
  </g>

  <!-- ============================================================
       PHASE 4 详情
  ============================================================ -->
  <g transform="translate(848, 250)">
    <rect x="0" y="0" width="242" height="32" rx="5" fill="#fff" stroke="#C090D8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="21" text-anchor="middle" fill="#4A2070" font-size="11">各维度评分结果汇总</text>

    <rect x="0" y="42" width="242" height="32" rx="5" fill="#fff" stroke="#C090D8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="63" text-anchor="middle" fill="#4A2070" font-size="11">Badcase识别与标注</text>

    <rect x="0" y="84" width="242" height="32" rx="5" fill="#fff" stroke="#C090D8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="105" text-anchor="middle" fill="#4A2070" font-size="11">问题分类统计</text>

    <rect x="0" y="126" width="242" height="32" rx="5" fill="#fff" stroke="#C090D8" stroke-width="1" filter="url(#s)"/>
    <text x="121" y="147" text-anchor="middle" fill="#4A2070" font-size="11">评测报告输出</text>
