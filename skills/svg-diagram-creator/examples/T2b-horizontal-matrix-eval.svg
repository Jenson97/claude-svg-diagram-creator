    <rect x="0"   y="0"  width="116" height="32" rx="4" fill="#FFF0E0" stroke="#E0A070" stroke-width="0.8" filter="url(#s)"/>
    <text x="58"  y="21" text-anchor="middle" fill="#7A3800" font-size="11">公众人物侵权</text>
    <rect x="126" y="0"  width="116" height="32" rx="4" fill="#FFF0E0" stroke="#E0A070" stroke-width="0.8" filter="url(#s)"/>
    <text x="184" y="21" text-anchor="middle" fill="#7A3800" font-size="11">违规内容检测</text>
    <rect x="0"   y="40" width="116" height="32" rx="4" fill="#FFF0E0" stroke="#E0A070" stroke-width="0.8" filter="url(#s)"/>
    <text x="58"  y="61" text-anchor="middle" fill="#7A3800" font-size="11">素材版权风险</text>
    <rect x="126" y="40" width="116" height="32" rx="4" fill="#FFF0E0" stroke="#E0A070" stroke-width="0.8" filter="url(#s)"/>
    <text x="184" y="61" text-anchor="middle" fill="#7A3800" font-size="11">竞品品牌检测</text>
  </g>

