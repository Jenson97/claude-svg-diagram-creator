<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.13"/></filter>
    <filter id="s2"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <linearGradient id="gTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A3060"/>
      <stop offset="100%" style="stop-color:#3A60A0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="560" fill="#F0F3F8"/>
  <rect x="0" y="0" width="900" height="52" fill="url(#gTitle)"/>
  <text x="450" y="31" text-anchor="middle" fill="white" font-size="17" font-weight="bold">对话规则应该写在哪里</text>
  <text x="450" y="46" text-anchor="middle" fill="#AACCFF" font-size="11">不是开头的「前言」，而是各个判断节点旁边</text>

  <!-- Left: bad placement (front-loaded) -->
  <rect x="20" y="66" width="390" height="478" rx="12" fill="white" filter="url(#s)"/>
  <rect x="20" y="66" width="390" height="42" rx="12" fill="#C03030"/>
  <rect x="20" y="94" width="390" height="14" fill="#C03030"/>
  <text x="215" y="91" text-anchor="middle" fill="white" font-size="14" font-weight="bold">😞  集中写在 SKILL.md 开头</text>

  <!-- Rules blob at top -->
  <rect x="40" y="122" width="350" height="88" rx="8" fill="#FFF0F0" stroke="#F0A0A0" stroke-width="1.2" filter="url(#s2)"/>
  <text x="215" y="142" text-anchor="middle" fill="#B03030" font-size="11" font-weight="bold">前言区：所有对话规则堆在一起</text>
  <text x="60" y="160" fill="#C06060" font-size="10">- 如果用户意图不清晰，请先追问再执行</text>
  <text x="60" y="175" fill="#C06060" font-size="10">- 遇到异常数据要提醒用户</text>
  <text x="60" y="190" fill="#C06060" font-size="10">- 超出范围时说明能力边界并给替代方案</text>

  <!-- Execution nodes below -->
  <rect x="40" y="226" width="350" height="36" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1"/>
  <text x="215" y="248" text-anchor="middle" fill="#2B5090" font-size="10">Step 1 · 接收用户输入 · 拆解意图</text>

  <rect x="40" y="274" width="350" height="36" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1"/>
  <text x="215" y="296" text-anchor="middle" fill="#2B5090" font-size="10">Step 2 · 构造查询参数</text>

  <rect x="40" y="322" width="350" height="36" rx="6" fill="#2D3E56"/>
  <text x="215" y="344" text-anchor="middle" fill="#AACCFF" font-size="10">脚本 · 调用接口获取数据</text>

  <rect x="40" y="370" width="350" height="36" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1"/>
  <text x="215" y="392" text-anchor="middle" fill="#2B5090" font-size="10">Step 3 · 分析返回数据</text>

  <rect x="40" y="418" width="350" height="36" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1"/>
  <text x="215" y="440" text-anchor="middle" fill="#2B5090" font-size="10">Step 4 · 生成回复</text>

  <!-- Problem annotations -->
  <text x="215" y="486" text-anchor="middle" fill="#C03030" font-size="11" font-weight="bold">问题</text>
  <text x="215" y="502" text-anchor="middle" fill="#C06060" font-size="10">规则在开头出现，等到用到时已经被遗忘</text>
  <text x="215" y="516" text-anchor="middle" fill="#C06060" font-size="10">或者模型不知道哪条规则和当前节点有关</text>

  <!-- Right: correct placement (co-located) -->
  <rect x="490" y="66" width="390" height="478" rx="12" fill="white" filter="url(#s)"/>
  <rect x="490" y="66" width="390" height="42" rx="12" fill="#2A7A2A"/>
  <rect x="490" y="94" width="390" height="14" fill="#2A7A2A"/>
  <text x="685" y="91" text-anchor="middle" fill="white" font-size="14" font-weight="bold">✅  写在需要用到它的节点旁边</text>

  <!-- Node 1 with dialogue rule -->
  <rect x="510" y="122" width="350" height="60" rx="6" fill="#E8F2FF" stroke="#5B8DD9" stroke-width="1.5" filter="url(#s2)"/>
  <text x="685" y="140" text-anchor="middle" fill="#2B5090" font-size="10" font-weight="bold">Step 1 · 接收用户输入 · 拆解意图</text>
  <rect x="520" y="148" width="330" height="24" rx="4" fill="#D4E8FF" stroke="#84B0DC" stroke-width="1"/>
  <text x="685" y="163" text-anchor="middle" fill="#1A4A90" font-size="9">追问规则 → 以下字段缺失时先追问：目标实体、时间范围</text>

  <!-- Node 2 with no rule -->
  <rect x="510" y="196" width="350" height="36" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1"/>
  <text x="685" y="218" text-anchor="middle" fill="#2B5090" font-size="10">Step 2 · 构造查询参数</text>

  <!-- Script node with fallback rule -->
  <rect x="510" y="244" width="350" height="60" rx="6" fill="#2D3E56" filter="url(#s2)"/>
  <text x="685" y="262" text-anchor="middle" fill="white" font-size="10" font-weight="bold">脚本 · 调用接口获取数据</text>
  <rect x="520" y="270" width="330" height="24" rx="4" fill="rgba(255,255,255,0.12)"/>
  <text x="685" y="285" text-anchor="middle" fill="#AACCFF" font-size="9">降级规则 → 接口不支持此查询组合时，说明原因 + 给替代</text>

  <!-- Node 3 with proactive rule -->
  <rect x="510" y="318" width="350" height="60" rx="6" fill="#E8F2FF" stroke="#5B8DD9" stroke-width="1.5" filter="url(#s2)"/>
  <text x="685" y="336" text-anchor="middle" fill="#2B5090" font-size="10" font-weight="bold">Step 3 · 分析返回数据</text>
  <rect x="520" y="344" width="330" height="24" rx="4" fill="#E0F4C8" stroke="#90C870" stroke-width="1"/>
  <text x="685" y="359" text-anchor="middle" fill="#2A6A1A" font-size="9">主动提示规则 → 数据为空或字段异常时主动说明</text>

  <!-- Node 4 -->
  <rect x="510" y="392" width="350" height="36" rx="6" fill="#E8F2FF" stroke="#84B0DC" stroke-width="1"/>
  <text x="685" y="414" text-anchor="middle" fill="#2B5090" font-size="10">Step 4 · 生成回复</text>

  <!-- Success label -->
  <rect x="520" y="446" width="330" height="44" rx="8" fill="#E8F8E8" stroke="#80C880" stroke-width="1.2"/>
  <text x="685" y="465" text-anchor="middle" fill="#1A6A1A" font-size="11" font-weight="bold">规则在需要它的节点旁边出现</text>
  <text x="685" y="482" text-anchor="middle" fill="#3A8A3A" font-size="10">模型在执行到对应节点时，自然读到并应用</text>

  <!-- VS -->
  <circle cx="450" cy="310" r="24" fill="#2D3E56" filter="url(#s)"/>
  <text x="450" y="316" text-anchor="middle" fill="white" font-size="13" font-weight="bold">VS</text>

  <!-- connecting lines between nodes (right side) -->
  <line x1="685" y1="182" x2="685" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="232" x2="685" y2="244" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="304" x2="685" y2="318" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="378" x2="685" y2="392" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="428" x2="685" y2="446" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- connecting lines (left side) -->
  <line x1="215" y1="210" x2="215" y2="226" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="215" y1="262" x2="215" y2="274" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="215" y1="310" x2="215" y2="322" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="215" y1="358" x2="215" y2="370" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="215" y1="406" x2="215" y2="418" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
