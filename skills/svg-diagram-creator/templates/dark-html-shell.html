<!DOCTYPE html>
<!--
  深色技术风 HTML 外壳（"Cocoon 风格"）
  适用：T1/T2/T4/T5 等技术架构类图表的深色变体输出
  使用方法：把 SVG 主体替换到 <svg>...</svg> 标签内，并更新标题、副标题、卡片、页脚
  视觉来源：Cocoon-AI/architecture-diagram-generator (MIT License)
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[标题] · 架构图</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" integrity="sha384-en/ztfPSRkGfME4KIm05joYXynqzUgbsG5nMrj/xEFAHXkeZfO3yMK8QQ+mP7p1/" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Microsoft YaHei', 'PingFang SC', monospace;
      background: #020617;
      min-height: 100vh;
      padding: 2rem;
      color: white;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot {
      width: 12px; height: 12px; background: #22d3ee; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
    .diagram-container {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 1rem;
      border: 1px solid #1e293b;
      padding: 1.5rem;
      overflow-x: auto;
    }
    svg { width: 100%; min-width: 900px; display: block; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem; margin-top: 2rem;
    }
    .card {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 0.75rem;
      border: 1px solid #1e293b;
      padding: 1.25rem;
    }
    .card-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
    .card-dot { width: 8px; height: 8px; border-radius: 50%; }
    .card-dot.cyan    { background: #22d3ee; }
    .card-dot.emerald { background: #34d399; }
    .card-dot.violet  { background: #a78bfa; }
    .card-dot.amber   { background: #fbbf24; }
    .card-dot.rose    { background: #fb7185; }
    .card-dot.orange  { background: #fb923c; }
    .card h3 { font-size: 0.875rem; font-weight: 600; }
    .card ul { list-style: none; color: #94a3b8; font-size: 0.75rem; }
    .card li { margin-bottom: 0.375rem; }
    .footer { text-align: center; margin-top: 1.5rem; color: #475569; font-size: 0.75rem; }
    .toolbar { display: flex; gap: 0.5rem; margin-left: auto; flex-shrink: 0; align-items: center; }
    .toolbar-toggle {
      background: transparent; border: none; color: #475569;
      cursor: pointer; font-size: 1.25rem; line-height: 1;
      padding: 0.25rem 0.5rem; border-radius: 0.375rem;
      transition: color 0.2s, background 0.2s;
    }
    .toolbar-toggle:hover { color: #94a3b8; background: rgba(30, 41, 59, 0.5); }
    .toolbar-actions { display: none; gap: 0.5rem; }
    .toolbar.expanded .toolbar-actions { display: flex; }
    .toolbar-actions button {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.375rem 0.75rem;
      border-radius: 0.375rem;
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .toolbar-actions button:hover {
      background: rgba(51, 65, 85, 0.8); color: white; border-color: #475569;
    }
    @media print {
      body { background: #020617; padding: 1rem; }
      .toolbar { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="container" id="report-container">
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>[标题]</h1>
        <div class="toolbar">
          <div class="toolbar-actions">
            <button onclick="copyAsImage(this)">📋 复制</button>
            <button onclick="downloadPNG(this)">🖼️ PNG</button>
            <button onclick="downloadPDF(this)">📄 PDF</button>
          </div>
          <button class="toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')" title="导出选项" aria-label="导出选项">⋯</button>
        </div>
      </div>
      <p class="subtitle">[副标题描述]</p>
    </div>

    <div class="diagram-container">
      <!-- ============================================
           把你的 SVG 主体粘贴到这里
           记得：
           1. 保留 <defs> 中的 grid pattern 和 arrowhead marker
           2. 第一行画背景 grid: <rect width="100%" height="100%" fill="url(#grid)"/>
           3. 箭头先画（z-order 在组件下方）
           4. 半透明组件下需要不透明背景遮罩时，先画一层 fill="#0f172a" 的 rect
           ============================================ -->
      <svg viewBox="0 0 1000 680">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)"/>
        <!-- 主体内容在此 -->
      </svg>
    </div>

    <!-- 可选：底部信息卡片，3 列；如不需要可删除整个 .cards 区块 -->
    <div class="cards">
      <div class="card">
        <div class="card-header">
          <div class="card-dot cyan"></div>
          <h3>[卡片标题 1]</h3>
        </div>
        <ul>
          <li>• 要点 1</li>
          <li>• 要点 2</li>
          <li>• 要点 3</li>
        </ul>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-dot emerald"></div>
          <h3>[卡片标题 2]</h3>
        </div>
        <ul>
          <li>• 要点 1</li>
          <li>• 要点 2</li>
          <li>• 要点 3</li>
        </ul>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-dot violet"></div>
          <h3>[卡片标题 3]</h3>
        </div>
        <ul>
          <li>• 要点 1</li>
          <li>• 要点 2</li>
          <li>• 要点 3</li>
        </ul>
      </div>
    </div>

    <p class="footer">[项目名] · [元数据：版本/日期/作者]</p>
  </div>

  <script>
    async function copyAsImage(btn) {
      const orig = btn.textContent;
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        btn.textContent = '✓ 已复制';
      } catch (e) { btn.textContent = '✗ 失败'; }
      setTimeout(() => btn.textContent = orig, 2000);
    }
    async function downloadPNG(btn) {
      const orig = btn.textContent;
      btn.textContent = '⏳ ...';
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const link = document.createElement('a');
        link.download = 'diagram.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.textContent = '✓ 完成';
      } catch (e) { btn.textContent = '✗ 失败'; }
      setTimeout(() => btn.textContent = orig, 2000);
    }
    async function downloadPDF(btn) {
      const orig = btn.textContent;
      btn.textContent = '⏳ ...';
      try {
        const el = document.getElementById('report-container');
        const r = el.getBoundingClientRect();
        const pad = 32;
        const canvas = await html2canvas(document.body, { backgroundColor: '#020617', scale: 2, useCORS: true, ignoreElements: (e) => e.classList && e.classList.contains('toolbar'), x: r.left + window.scrollX - pad, y: r.top + window.scrollY - pad, width: r.width + pad * 2, height: r.height + pad * 2 });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const orientation = canvas.width > canvas.height ? 'landscape' : 'portrait';
        const pdf = new jsPDF({ orientation, unit: 'px', format: [canvas.width, canvas.height], hotfixes: ['px_scaling'] });
        pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
        pdf.save('diagram.pdf');
        btn.textContent = '✓ 完成';
      } catch (e) { btn.textContent = '✗ 失败'; }
      setTimeout(() => btn.textContent = orig, 2000);
    }
  </script>
</body>
</html>
